<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>StoryApp - Bagikan Momenmu</title>

    <link rel="shortcut icon" href="images/logo.png" />
    <link rel="apple-touch-icon" href="images/logo.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <a href="#main-content" id="skip-link" class="skip-link"
      >Menuju konten utama</a
    >

    <header>
      <div class="header-content container">
        <a class="brand-name__link" href="#/">
          <img
            class="brand-name__link__image"
            src="images/logo.png"
            alt="StoryApp Logo"
          />
          <span class="brand-name__link__text">StoryApp</span>
        </a>

        <nav id="navigation-drawer" class="navigation-drawer">
          <ul id="navlist-main" class="navigation-drawer__navlist-main"></ul>
          <ul id="navlist" class="navigation-drawer__navlist"></ul>
        </nav>

        <button
          id="drawer-button"
          class="drawer-button"
          aria-label="Buka menu navigasi"
        >
          ☰
        </button>
      </div>
    </header>

    <main tabIndex="-1" id="main-content" class="main-content"></main>

    <footer>
      <div class="container">
        <hr />
        <div class="footer-content">
          <a class="brand-name__link" href="#/">
            <img
              class="brand-name__link__image"
              src="images/logo.png"
              alt="StoryApp Logo"
            />
            <span class="brand-name__link__text">StoryApp</span>
          </a>
          <p class="copyright">&copy; 2026 StoryApp. Bagikan Momenmu.</p>
        </div>
      </div>
    </footer>
  </body>
</html>
